<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BarberLedger">
  <meta name="theme-color" content="#000000">

  <title>Barber Ledger</title>

  <link rel="icon" type="image/x-icon" href="favicon 2.ico">
  <link rel="apple-touch-icon" href="apple.png">

  <link rel="stylesheet" href="styles.css?v=2.2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <div class="app-wrapper">
    <header>
      <h1 class="notebook-title">Barber Ledger</h1>
    </header>

    <main class="content-area">
      <section id="calc" class="tab-page active">
        <div class="main-card">
          <div class="input-row">
            <label>Weekly Cashbox</label>
            <input type="number" id="sum" inputmode="decimal" placeholder="0.00">
          </div>
          <div class="input-row">
            <label>Hours Worked</label>
            <input type="number" id="hours" inputmode="decimal" placeholder="0.00">
          </div>
          <div class="input-row">
            <label>Bonus</label>
            <input type="number" id="bonus" inputmode="decimal" placeholder="0.00">
          </div>
          <button class="btn-action" onclick="runCalculation()">ENREGISTRER</button>
        </div>
      </section>

      <section id="history" class="tab-page">
        <div id="history-list"></div>
      </section>

      <section id="analytics" class="tab-page">
        <div class="main-card"> <label>Performance Analytics</label>
          <div class="chart-container">
            <canvas id="balanceChart"></canvas>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="showTab('calc', this)">INPUT</button>
      <button class="nav-btn" onclick="showTab('history', this)">HISTORY</button>
      <button class="nav-btn" onclick="showTab('analytics', this)">GRAPH</button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="supabase.js"></script>
  <script src="script.js?v=2.1"></script>
</body>

</html>
